<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sal de Maré — Calendário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F2;
  --surface: #FFFFFF;
  --surface2: #F2F0EC;
  --border: #E8E4DE;
  --border2: #D8D4CC;
  --text: #1A1916;
  --muted: #8A8478;
  --faint: #C8C4BC;

  --f1: #A0732A; --f1-bg: #FBF3E4; --f1-dot: #C8922A;
  --f2: #2A7A58; --f2-bg: #E8F6EF; --f2-dot: #3DAF7A;
  --f3: #5A48B0; --f3-bg: #EEEAFB; --f3-dot: #7B6FD4;
  --f4: #2A62A0; --f4-bg: #E6F0FA; --f4-dot: #4A8FCC;
  --f5: #A03878; --f5-bg: #FAEBF4; --f5-dot: #C85A98;
  --f6: #A04828; --f6-bg: #FAEDE8; --f6-dot: #CC6840;
  --crit: #B02020; --crit-bg: #FAEAEA; --crit-dot: #D03030;
  --int: #6A6460; --int-bg: #F2F0EC; --int-dot: #8A8478;

  --done-opacity: 0.45;
  --radius: 8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ─── HEADER ─────────────────────────────── */
.header {
  padding: 2rem 2.5rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1.5rem;
  flex-wrap: wrap;
  background: var(--surface);
}
.brand h1 {
  font-family: 'Lora', serif;
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--text);
}
.brand p {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
  letter-spacing: 0.04em;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.tagline {
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--muted);
  padding-right: 16px;
  border-right: 1px solid var(--border);
}
.icon-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 400;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.icon-btn:hover { color: var(--text); border-color: var(--text); background: var(--surface2); }
.icon-btn svg { width: 12px; height: 12px; flex-shrink: 0; }

/* ─── TOOLBAR ────────────────────────────── */
.toolbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0.75rem 2.5rem;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
.f-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid transparent;
  background: transparent;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 400;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.f-btn:hover { color: var(--text); background: var(--surface2); }
.f-btn.active { color: var(--text); background: var(--surface2); border-color: var(--border2); font-weight: 500; }
.f-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

.view-toggle { display: flex; gap: 2px; margin-left: auto; }
.vt-btn {
  padding: 4px 10px;
  border: 1px solid var(--border);
  background: transparent;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
}
.vt-btn:first-child { border-radius: 6px 0 0 6px; }
.vt-btn:last-child  { border-radius: 0 6px 6px 0; border-left: none; }
.vt-btn.active { background: var(--text); color: var(--surface); border-color: var(--text); }

.today-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
}
.today-btn:hover { color: var(--text); border-color: var(--border2); }
.today-pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--crit-dot); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ─── MAIN ───────────────────────────────── */
.main { padding: 2rem 2.5rem 5rem; }

/* ─── MONTH ──────────────────────────────── */
.month-block { margin-bottom: 3rem; transition: opacity .2s; }
.month-block.dimmed { opacity: 0.15; pointer-events: none; }

.month-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 10px;
}
.month-left { display: flex; align-items: baseline; gap: 10px; }
.month-name {
  font-family: 'Lora', serif;
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
}
.phase-badge {
  font-size: 11px;
  padding: 2px 9px;
  border-radius: 10px;
  font-weight: 400;
  letter-spacing: 0.02em;
}
.week-count {
  font-size: 11px;
  color: var(--muted);
}
.week-count span { font-weight: 500; color: var(--text); }

/* ─── CALENDAR GRID ──────────────────────── */
.cal { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 3px; }
.dow {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--faint);
  text-align: center;
  padding: 0 0 6px;
  font-weight: 500;
}
.day {
  min-height: 84px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  padding: 7px 7px 5px;
  position: relative;
  transition: border-color .12s;
  cursor: default;
}
.day.empty { background: transparent; border-color: transparent; min-height: 0; }
.day.has-event { border-color: var(--border2); cursor: pointer; }
.day.has-event:hover { border-color: var(--text); }
.day.is-today { border-color: var(--text) !important; }
.day.is-today .dn { color: var(--text); font-weight: 500; }

.dn { font-size: 11px; color: var(--faint); margin-bottom: 4px; line-height: 1; }

/* week counter row */
.week-row-count {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  margin-bottom: 2px;
}
.wrc-label {
  font-size: 10px;
  color: var(--faint);
  background: var(--surface2);
  border-radius: 10px;
  padding: 1px 6px;
}
.wrc-label.warn { color: var(--f6); background: var(--f6-bg); }
.wrc-label.good { color: var(--f2); background: var(--f2-bg); }

/* ─── CHIPS ──────────────────────────────── */
.chip {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  line-height: 1.3;
  padding: 2px 6px 2px 4px;
  border-radius: 4px;
  margin-bottom: 2px;
  transition: opacity .12s;
  cursor: pointer;
  user-select: none;
}
.chip:hover { opacity: .8; }
.chip.done { opacity: var(--done-opacity); }
.chip.done .chip-text { text-decoration: line-through; }
.chip-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.chip-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chip-check { flex-shrink: 0; width: 12px; height: 12px; border-radius: 3px; border: 1px solid; display: flex; align-items: center; justify-content: center; transition: all .12s; }
.chip-check svg { width: 8px; height: 8px; opacity: 0; }
.chip.done .chip-check svg { opacity: 1; }

.chip.p-f1   { background: var(--f1-bg);   color: var(--f1); }
.chip.p-f1   .chip-check { border-color: var(--f1-dot); }
.chip.p-f1   .chip-check svg { stroke: var(--f1-dot); }
.chip.p-f2   { background: var(--f2-bg);   color: var(--f2); }
.chip.p-f2   .chip-check { border-color: var(--f2-dot); }
.chip.p-f2   .chip-check svg { stroke: var(--f2-dot); }
.chip.p-f3   { background: var(--f3-bg);   color: var(--f3); }
.chip.p-f3   .chip-check { border-color: var(--f3-dot); }
.chip.p-f3   .chip-check svg { stroke: var(--f3-dot); }
.chip.p-f4   { background: var(--f4-bg);   color: var(--f4); }
.chip.p-f4   .chip-check { border-color: var(--f4-dot); }
.chip.p-f4   .chip-check svg { stroke: var(--f4-dot); }
.chip.p-f5   { background: var(--f5-bg);   color: var(--f5); }
.chip.p-f5   .chip-check { border-color: var(--f5-dot); }
.chip.p-f5   .chip-check svg { stroke: var(--f5-dot); }
.chip.p-f6   { background: var(--f6-bg);   color: var(--f6); }
.chip.p-f6   .chip-check { border-color: var(--f6-dot); }
.chip.p-f6   .chip-check svg { stroke: var(--f6-dot); }
.chip.p-crit { background: var(--crit-bg); color: var(--crit); font-weight: 500; }
.chip.p-crit .chip-check { border-color: var(--crit-dot); }
.chip.p-crit .chip-check svg { stroke: var(--crit-dot); }
.chip.p-int  { background: var(--int-bg);  color: var(--int); }
.chip.p-int  .chip-check { border-color: var(--int-dot); }
.chip.p-int  .chip-check svg { stroke: var(--int-dot); }

/* add btn */
.add-btn {
  display: none;
  position: absolute;
  bottom: 5px; right: 5px;
  width: 18px; height: 18px;
  border-radius: 50%;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--muted);
  font-size: 14px;
  line-height: 1;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all .12s;
}
.day:hover .add-btn { display: flex; }
.add-btn:hover { background: var(--text); color: var(--surface); border-color: var(--text); }

/* deadline warning */
.deadline-warn {
  position: absolute;
  top: 5px; right: 6px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--crit-dot);
  animation: pulse 1.5s ease-in-out infinite;
}

/* ─── PHASE DIVIDER ─────────────────────── */
.phase-div {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 0.5rem 0 2rem;
}
.pd-line { flex: 1; height: 1px; background: var(--border); }
.pd-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  padding: 3px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  white-space: nowrap;
}

/* ─── MODAL ──────────────────────────────── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,25,22,0.45);
  z-index: 300;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 1.75rem;
  width: 100%;
  max-width: 400px;
  position: relative;
  animation: up .18s ease;
}
@keyframes up { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.modal-close {
  position: absolute;
  top: 14px; right: 16px;
  background: none; border: none;
  font-size: 20px; line-height: 1;
  color: var(--faint); cursor: pointer;
  transition: color .12s;
}
.modal-close:hover { color: var(--text); }
.modal-date { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 3px; }
.modal-title { font-family: 'Lora', serif; font-size: 18px; font-weight: 500; margin-bottom: 1.25rem; }

.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
.field input,
.field select,
.field textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 8px 10px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 300;
  outline: none;
  transition: border-color .14s;
  resize: vertical;
}
.field input:focus,
.field select:focus,
.field textarea:focus { border-color: var(--text); }
.field select option { background: var(--surface); }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.mactions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; align-items: center; }
.mactions .del-btn { margin-right: auto; }
.mbtn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 16px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: transparent;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  transition: all .14s;
}
.mbtn:hover { color: var(--text); border-color: var(--text); }
.mbtn.primary { background: var(--text); color: var(--surface); border-color: var(--text); font-weight: 500; }
.mbtn.primary:hover { opacity: .85; }
.mbtn.danger { color: var(--crit); border-color: #E8C0C0; }
.mbtn.danger:hover { background: var(--crit-bg); }

/* day detail list */
.ev-list { margin-bottom: 1rem; }
.ev-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.ev-item:last-child { border: none; }
.ev-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.ev-body { flex: 1; min-width: 0; }
.ev-title { font-size: 13px; line-height: 1.4; }
.ev-title.done-text { text-decoration: line-through; color: var(--muted); }
.ev-meta { font-size: 11px; color: var(--muted); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }
.ev-resp { display: inline-flex; align-items: center; gap: 3px; }
.ev-acts { display: flex; gap: 5px; margin-top: 5px; }
.sm-btn {
  font-size: 11px;
  padding: 2px 9px;
  border-radius: 10px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all .12s;
}
.sm-btn:hover { color: var(--text); border-color: var(--border2); background: var(--surface2); }
.sm-btn.danger { color: var(--crit); }
.sm-btn.danger:hover { background: var(--crit-bg); }
.sm-btn.done-btn.active { color: var(--f2); border-color: var(--f2-bg); background: var(--f2-bg); }

/* assignee badge */
.assignee-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
}

/* deadline near indicator on chip */
.chip.deadline-near::after {
  content: '!';
  font-size: 9px;
  font-weight: 700;
  color: var(--crit);
  margin-left: 2px;
  flex-shrink: 0;
}

/* ─── EVENT TYPE BADGE ──────────────────── */
.type-badge {
  display: inline-flex;
  align-items: center;
  font-size: 10px;
  padding: 1px 7px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  white-space: nowrap;
  flex-shrink: 0;
}
.type-badge.post          { background:#EEF6E8; color:#3A7020; border-color:#C0DCA8; }
.type-badge.lancamento    { background:#FAEAEA; color:#8A1A1A; border-color:#E0AAAA; }
.type-badge.gravacao      { background:#E8F0FA; color:#1A3A70; border-color:#A8C0E0; }
.type-badge.ensaio        { background:#F4EAFB; color:#4A1A7A; border-color:#C8AADC; }
.type-badge.sessao        { background:#FBF3E4; color:#7A4A10; border-color:#DCC080; }
.type-badge.reuniao       { background:#F2F0EC; color:#5A5040; border-color:#C8C4BC; }
.type-badge.acao-fisica   { background:#FAEDE8; color:#7A3010; border-color:#DCA898; }
.type-badge.compromisso   { background:#F0F0F0; color:#404040; border-color:#C8C8C8; }

.chip-type {
  font-size: 9px;
  padding: 0 4px;
  border-radius: 2px;
  flex-shrink: 0;
  font-weight: 500;
  line-height: 1.7;
  margin-left: 1px;
}
.chip-type.post          { background:#D8EEC8; color:#2A6010; }
.chip-type.lancamento    { background:#F0C0C0; color:#7A1010; }
.chip-type.gravacao      { background:#C0D4F0; color:#103070; }
.chip-type.ensaio        { background:#E0C8F0; color:#3A1060; }
.chip-type.sessao        { background:#F0DCA8; color:#603808; }
.chip-type.reuniao       { background:#E0DCD4; color:#484038; }
.chip-type.acao-fisica   { background:#F0C8B8; color:#602010; }
.chip-type.compromisso   { background:#E0E0E0; color:#383838; }

/* week counter pills */
.wrc-breakdown { display:flex; gap:4px; align-items:center; }
.wrc-pill { font-size:10px; padding:1px 6px; border-radius:10px; white-space:nowrap; }
.wrc-pill.posts  { background:#EEF6E8; color:#3A7020; }
.wrc-pill.outros { background:var(--surface2); color:var(--muted); }

/* type selector visual */
.type-selector { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:4px; }
.type-opt {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:8px 4px; border-radius:8px; border:1px solid var(--border2);
  background:transparent; cursor:pointer; transition:all .14s;
  font-family:'Inter',sans-serif; font-size:11px; color:var(--muted);
  text-align:center; line-height:1.3;
}
.type-opt:hover { border-color:var(--border2); background:var(--surface2); color:var(--text); }
.type-opt.selected { border-color:var(--text); background:var(--text); color:var(--surface); }
.type-opt.selected .to-icon { filter:invert(1); }
.to-icon { font-size:18px; line-height:1; }

.gate {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  background:
    radial-gradient(circle at top, rgba(160, 115, 42, 0.08), transparent 32%),
    linear-gradient(180deg, #faf8f4 0%, #f3efe8 100%);
}
.gate-card {
  width: min(460px, 100%);
  background: rgba(255,255,255,0.92);
  border: 1px solid var(--border);
  border-radius: 18px;
  box-shadow: 0 20px 50px rgba(26, 25, 22, 0.08);
  padding: 2rem;
}
.gate-kicker {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--muted);
  margin-bottom: 0.85rem;
}
.gate-card h2 {
  font-family: 'Lora', serif;
  font-size: 28px;
  font-weight: 500;
  margin-bottom: 0.6rem;
}
.gate-card p {
  color: var(--muted);
  margin-bottom: 1.2rem;
}
.gate-form {
  display: grid;
  gap: 0.85rem;
}
.gate-form input {
  width: 100%;
  padding: 0.95rem 1rem;
  border-radius: 12px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text);
  font: inherit;
}
.gate-form input:focus {
  outline: none;
  border-color: var(--text);
}
.gate-submit {
  border: none;
  border-radius: 999px;
  background: var(--text);
  color: var(--surface);
  padding: 0.9rem 1.2rem;
  font: inherit;
  font-weight: 500;
  cursor: pointer;
}
.gate-submit:hover { opacity: 0.92; }
.gate-error {
  min-height: 20px;
  color: var(--crit);
  font-size: 12px;
}

.sync-pill {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid var(--border2);
  color: var(--muted);
  font-size: 12px;
  white-space: nowrap;
}
.sync-pill::before {
  content: '';
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--faint);
}
.sync-pill.ok::before { background: var(--f2-dot); }

// ─── STATE ────────────────────────────────────────────────────────────────
function loadCachedState() {
  try {
    const raw = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
    if(raw && typeof raw === 'object' && raw.events && typeof raw.updatedAt === 'number') {
      return { events: raw.events, updatedAt: raw.updatedAt, dirty: !!raw.dirty };
    }
    if(raw && typeof raw === 'object') {
      return { events: raw, updatedAt: 0, dirty: false };
    }
  } catch (error) {
    console.warn('Falha ao ler cache local.', error);
  }
  return { events: JSON.parse(JSON.stringify(DEFAULT_EVS)), updatedAt: 0, dirty: false };
}

const cachedState = loadCachedState();
let EVS = cachedState.events;
let localUpdatedAt = cachedState.updatedAt;
let localDirty = cachedState.dirty;
let db = null;
let calendarRef = null;
let unsubscribeSnapshot = null;
let syncReady = false;
let syncStarted = false;
let saveTimer = null;
let pendingSyncJson = null;
let syncRetryTimer = null;

// Migrate old events without tp field — infer type from context
function migrateEvents(evs) {
  if(!evs || typeof evs !== 'object') return {};
  Object.values(evs).forEach(dayEvs => {
    dayEvs.forEach(e => {
      if(!e.tp) {
        const t = e.t.toLowerCase();
        if(t.includes('lançamento') || t.includes('lancamento')) e.tp = 'lancamento';
        else if(t.includes('gravação') || t.includes('gravacao') || t.includes('gravar') || t.includes('bloco')) e.tp = 'gravacao';
        else if(t.includes('ensaio')) e.tp = 'ensaio';
        else if(t.includes('sessão') || t.includes('sessao') || t.includes('composição') || t.includes('composicao')) e.tp = 'sessao';
        else if(t.includes('mixagem') || t.includes('masterização') || t.includes('pré-produção') || t.includes('arranjo')) e.tp = 'sessao';
        else if(t.includes('cartaz') || t.includes('escuta coletiva') || t.includes('objeto físico') || t.includes('ativação')) e.tp = 'acao-fisica';
        else if(e.p === 'int') e.tp = 'compromisso';
        else e.tp = 'post';
      }
    });
  });
  return evs;
}

EVS = migrateEvents(EVS);
let filter = 'all';
let viewMode = 'month';
const today = new Date();

function setSyncStatus(kind, text) {
  const el = document.getElementById('sync-status');
  const help = document.getElementById('sync-help');
  const retryBtn = document.getElementById('sync-retry-btn');
  if(!el) return;
  el.className = `sync-pill ${kind}`;
  el.textContent = text;
  if(help) {
    const helpText = {
      ok: 'Alteracoes em qualquer aparelho ficam visiveis para toda a equipe quase em tempo real.',
      syncing: 'Aguarde alguns segundos para o status voltar para Sincronizado antes de fechar a pagina.',
      error: 'O Firebase falhou. Sem isso, cada navegador guarda uma versao separada.',
      local: 'Modo local: as mudancas ficam salvas so neste navegador ate a conexao com o Firebase voltar.'
    };
    help.textContent = helpText[kind] || '';
    help.classList.toggle('warn', kind === 'error' || kind === 'local');
  }
  if(retryBtn) {
    retryBtn.classList.toggle('hidden', kind !== 'error' && kind !== 'local');
  }
}
function escapeHtml(value='') {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function persistCache() {
  localStorage.setItem(CACHE_KEY, JSON.stringify({
    events: EVS,
    updatedAt: localUpdatedAt,
    dirty: localDirty
  }));
}
function save() {
  localUpdatedAt = Date.now();
  localDirty = true;
  persistCache();
  if(!syncReady || !calendarRef) {
    setSyncStatus('local', 'Salvo so neste navegador');
    return;
  }
  pendingSyncJson = JSON.stringify(EVS);
  setSyncStatus('syncing', 'Sincronizando');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(pushEventsToFirestore, 250);
}
async function pushEventsToFirestore() {
  if(!calendarRef) return;
  try {
    const eventsToSave = JSON.parse(pendingSyncJson || JSON.stringify(EVS));
    await setDoc(calendarRef, {
      events: eventsToSave,
      updatedAt: serverTimestamp()
    }, { merge: true });
  } catch (error) {
    console.error(error);
    pendingSyncJson = null;
    setSyncStatus('error', 'Erro ao sincronizar');
    scheduleRetrySync();
  }
}
function clearSyncRetry() {
  clearTimeout(syncRetryTimer);
  syncRetryTimer = null;
}
function cleanupSyncState() {
  clearSyncRetry();
  clearTimeout(saveTimer);
  saveTimer = null;
  if(unsubscribeSnapshot) {
    unsubscribeSnapshot();
    unsubscribeSnapshot = null;
  }
  db = null;
  calendarRef = null;
  syncReady = false;
  syncStarted = false;
}
function scheduleRetrySync(delay = 4000) {
  if(syncRetryTimer) return;
  syncRetryTimer = setTimeout(() => {
    syncRetryTimer = null;
    retrySync();
  }, delay);
}
function retrySync() {
  cleanupSyncState();
  if(!navigator.onLine) {
    setSyncStatus('local', 'Sem internet');
    scheduleRetrySync(5000);
    return;
  }
  setSyncStatus('syncing', 'Reconectando');
  startSync();
}
function pad(n) { return String(n).padStart(2,'0'); }
function fmtKey(y,m,d) { return `${y}-${pad(m+1)}-${pad(d)}`; }
function keyLabel(key) {
  const [y,m,d]=key.split('-');
  return `${parseInt(d)} de ${MONTHS_PT[parseInt(m)-1]}, ${y}`;
}
function isNearDeadline(key) {
  const d = new Date(key+'T00:00:00');
  const diff = (d - today) / 86400000;
  return diff >= 0 && diff <= 3;
}

// ─── WEEK COUNT ──────────────────────────────────────────────────────────
function countPostsInWeek(y, m, weekStart, weekEnd, target) {
  let count = 0;
  for(let d = weekStart; d <= weekEnd; d++) {
    const key = fmtKey(y, m, d);
    const evs = EVS[key] || [];
    evs.forEach(e => { if(EVENT_TYPES[e.tp]?.countAsPost) count++; });
  }
  return count;
}

// ─── RENDER ──────────────────────────────────────────────────────────────
function buildAll() {
  const container = document.getElementById('main');
  container.innerHTML = '';

  if(viewMode === 'week') { buildWeekView(container); return; }

  let prevPh = null;
  MONTHS_DEF.forEach(({y,m,n,ph,target}) => {
    const p = PM[ph];

    if(ph !== prevPh) {
      const div = document.createElement('div');
      div.className = 'phase-div';
      div.innerHTML = `<div class="pd-line"></div><div class="pd-label" style="color:${p.c}">${p.l}</div><div class="pd-line"></div>`;
      container.appendChild(div);
      prevPh = ph;
    }

    const block = document.createElement('div');
    block.className = 'month-block';
    block.dataset.ph = ph;
    block.id = `m-${y}-${m}`;

    // count posts this month
    const daysInMonth = new Date(y,m+1,0).getDate();
    let totalPosts = 0, totalOther = 0;
    for(let d=1;d<=daysInMonth;d++){
      (EVS[fmtKey(y,m,d)]||[]).forEach(e=>{
        if(EVENT_TYPES[e.tp]?.countAsPost) totalPosts++;
        else totalOther++;
      });
    }

    const firstDay = new Date(y,m,1).getDay();
    const dim = new Date(y,m+1,0).getDate();
    const weeks = Math.ceil((firstDay + dim) / 7);
    const postsPerWeek = weeks > 0 ? (totalPosts / weeks).toFixed(1) : '0';

    block.innerHTML = `<div class="month-head">
      <div class="month-left">
        <span class="month-name">${n}</span>
        <span class="phase-badge" style="color:${p.c};background:${p.bg};border:1px solid ${p.dot}22">${p.l}</span>
      </div>
      <span class="week-count"><span>${postsPerWeek}</span> posts/semana · meta: ${target[0]}–${target[1]}</span>
    </div>`;

    const cal = document.createElement('div');
    cal.className = 'cal';
    DAYS_PT.forEach(d=>{ cal.innerHTML+=`<div class="dow">${d}</div>`; });

    // build weeks with counters
    const cells = [];
    for(let i=0;i<firstDay;i++) cells.push(null);
    for(let d=1;d<=dim;d++) cells.push(d);

    let weekPostCount = 0;
    let weekStart = null;
    let weekCells = [];

    cells.forEach((d, idx) => {
      const dayOfWeek = idx % 7;

      if(dayOfWeek === 0) {
        if(weekCells.length && weekStart!==null) {
          appendWeekRow(cal, weekCells, y, m, weekStart, weekPostCount, target);
        }
        weekCells = [];
        weekPostCount = 0;
        weekStart = d;
      }

      if(d === null) {
        weekCells.push(null);
      } else {
        const key = fmtKey(y,m,d);
        const evs = EVS[key]||[];
        weekPostCount += evs.filter(e=>EVENT_TYPES[e.tp]?.countAsPost).length;
        const isToday = today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
        weekCells.push({d, key, evs, isToday});
      }

      if(idx===cells.length-1) {
        while(weekCells.length<7) weekCells.push(null);
        appendWeekRow(cal, weekCells, y, m, weekStart, weekPostCount, target);
      }
    });

    block.appendChild(cal);
    container.appendChild(block);
  });

  applyFilter(filter, false);
}

function appendWeekRow(cal, weekCells, y, m, weekStart, postCount, target) {
  // week post count label — count only post/lancamento types
  let realPostCount = 0;
  let otherCount = 0;
  weekCells.forEach(cell => {
    if(!cell) return;
    (EVS[cell.key]||[]).forEach(e => {
      if(EVENT_TYPES[e.tp]?.countAsPost) realPostCount++;
      else otherCount++;
    });
  });

  const countRow = document.createElement('div');
  countRow.style.cssText = 'grid-column:1/-1;display:flex;justify-content:flex-end;gap:4px;padding:2px 2px 0;';

  if(weekStart !== null && (realPostCount > 0 || otherCount > 0)) {
    let postsClass = realPostCount < target[0] ? 'warn' : 'good';
    let html = '';
    if(realPostCount > 0) {
      html += `<span class="wrc-pill posts">${realPostCount} post${realPostCount!==1?'s':''}</span>`;
    }
    if(otherCount > 0) {
      html += `<span class="wrc-pill outros">${otherCount} outro${otherCount!==1?'s':''}</span>`;
    }
    if(realPostCount > 0) {
      html += `<span class="wrc-label ${postsClass}">meta: ${target[0]}–${target[1]}</span>`;
    }
    countRow.innerHTML = html;
    cal.appendChild(countRow);
  }

  weekCells.forEach(cell => {
    const el = document.createElement('div');
    if(!cell) {
      el.className='day empty'; cal.appendChild(el); return;
    }
    const {d, key, evs, isToday} = cell;
    const hasCrit = evs.some(e=>e.p==='crit');
    const hasDeadline = hasCrit && isNearDeadline(key);

    el.className='day'+(isToday?' is-today':'')+(evs.length?' has-event':'');
    el.dataset.key=key;
    el.dataset.label=keyLabel(key);

    if(hasDeadline) {
      const w=document.createElement('div');w.className='deadline-warn';el.appendChild(w);
    }

    const dn=document.createElement('div');dn.className='dn';dn.textContent=d;el.appendChild(dn);

    evs.forEach((e,i)=>{
      const chip=document.createElement('div');
      const tp = e.tp || 'post';
      const tpMeta = EVENT_TYPES[tp] || EVENT_TYPES.post;
      chip.className=`chip p-${e.p}`+(e.done?' done':'')+(isNearDeadline(key)&&e.p==='crit'?' deadline-near':'');
      chip.dataset.key=key; chip.dataset.idx=i;
      chip.innerHTML=`<span class="chip-dot" style="background:${PM[e.p]?.dot||'var(--int-dot)'}"></span><span class="chip-text">${e.t}</span><span class="chip-type ${tp}" title="${tpMeta.label}">${tpMeta.icon}</span><span class="chip-check"><svg viewBox="0 0 8 8" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1,4 3,6 7,2"/></svg></span>`;
      chip.querySelector('.chip-check').addEventListener('click', ev=>{ev.stopPropagation();toggleDone(key,i);});
      chip.addEventListener('click', ev=>{ev.stopPropagation();openEdit(key,i);});
      el.appendChild(chip);
    });

    const addBtn=document.createElement('button');addBtn.className='add-btn';addBtn.textContent='+';
    addBtn.title='Adicionar evento';
    addBtn.addEventListener('click', ev=>{ev.stopPropagation();openAdd(key,el.dataset.label);});
    el.appendChild(addBtn);

    if(evs.length) el.addEventListener('click', ()=>openDay(key,el.dataset.label));
    cal.appendChild(el);
  });
}

// ─── WEEK VIEW ────────────────────────────────────────────────────────────
function buildWeekView(container) {
  const thisMonday = new Date(today);
  thisMonday.setDate(today.getDate() - (today.getDay()||7) + 1);

  for(let w=0; w<8; w++) {
    const weekStart = new Date(thisMonday);
    weekStart.setDate(thisMonday.getDate() + w*7);

    const weekDiv = document.createElement('div');
    weekDiv.style.cssText = 'margin-bottom:2rem';

    const weekLabel = weekStart.toLocaleDateString('pt-BR',{day:'numeric',month:'long',year:'numeric'});
    weekDiv.innerHTML = `<div style="font-family:'Lora',serif;font-size:15px;font-weight:500;margin-bottom:10px;color:var(--muted)">Semana de ${weekLabel}</div>`;

    const grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px';

    DAYS_PT.forEach(d=>{ grid.innerHTML+=`<div class="dow">${d}</div>`; });

    for(let d=0;d<7;d++) {
      const date = new Date(weekStart);
      date.setDate(weekStart.getDate()+d);
      const key = `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
      const evs = EVS[key]||[];
      const isToday = date.toDateString()===today.toDateString();

      const cell=document.createElement('div');
      cell.className='day'+(isToday?' is-today':'')+(evs.length?' has-event':'');
      cell.style.minHeight='110px';
      cell.dataset.key=key;

      const dn=document.createElement('div');
      dn.className='dn';
      dn.textContent=date.getDate()+' '+MONTHS_PT[date.getMonth()].slice(0,3);
      cell.appendChild(dn);

      evs.forEach((e,i)=>{
        const chip=document.createElement('div');
        const tp = e.tp || 'post';
        const tpMeta = EVENT_TYPES[tp] || EVENT_TYPES.post;
        chip.className=`chip p-${e.p}`+(e.done?' done':'');
        chip.innerHTML=`<span class="chip-dot" style="background:${PM[e.p]?.dot||'var(--int-dot)'}"></span><span class="chip-text">${e.t}</span><span class="chip-type ${tp}" title="${tpMeta.label}">${tpMeta.icon}</span><span class="chip-check"><svg viewBox="0 0 8 8" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1,4 3,6 7,2"/></svg></span>`;
        chip.querySelector('.chip-check').addEventListener('click', ev=>{ev.stopPropagation();toggleDone(key,i);});
        chip.addEventListener('click', ev=>{ev.stopPropagation();openEdit(key,i);});
        cell.appendChild(chip);
      });

      const addBtn=document.createElement('button');addBtn.className='add-btn';addBtn.textContent='+';
      addBtn.addEventListener('click', ev=>{ev.stopPropagation();openAdd(key,key);});
      cell.appendChild(addBtn);
      if(evs.length) cell.addEventListener('click',()=>openDay(key,key));
      grid.appendChild(cell);
    }
    weekDiv.appendChild(grid);
    container.appendChild(weekDiv);
  }
}

function saveNew(key, label) {

  const p=document.getElementById('ev-p').value;
  const r=document.getElementById('ev-r').value;
  const note=document.getElementById('ev-n').value.trim();
  const tp=document.getElementById('ev-tp').value||'post';
  if(!t) { document.getElementById('ev-t').focus(); return; }
  if(!EVS[key]) EVS[key]=[];
  EVS[key].push({p,t,r,tp,done:false,note});
  save(); buildAll(); closeOverlay();
}

    <div class="modal-title">Editar evento</div>
    <div class="field"><label>Tipo de compromisso</label>
      ${typeSelector(tp)}
      <input type="hidden" id="ev-tp" value="${tp}">
    </div>
    <div class="field"><label>DescriÃ§Ã£o</label>
      <input id="ev-t" type="text" value="${safeTitle}"></div>
    <div class="field-row">
      <div class="field"><label>Fase</label><select id="ev-p">${phaseOptions(e.p)}</select></div>

    </div>

    </div>`;
  document.getElementById('modal-delete-edit').addEventListener('click', ()=>deleteEv(key, idx));

  document.getElementById('modal-save-edit').addEventListener('click', ()=>saveEdit(key, idx));
  openOverlay();
  setTimeout(()=>{ const el=document.getElementById('ev-t'); el.focus(); el.setSelectionRange(el.value.length,el.value.length); },60);
}

function saveEdit(key, idx) {
  const t=document.getElementById('ev-t').value.trim();
  const tp=document.getElementById('ev-tp').value||'post';
  if(!t) return;
  EVS[key][idx]={
    ...EVS[key][idx],
    t,
    tp,
    p:document.getElementById('ev-p').value,
    r:document.getElementById('ev-r').value,
    note:document.getElementById('ev-n').value.trim()
  };
  save(); buildAll(); closeOverlay();
}

function deleteEv(key, idx) {
  if(!EVS[key] || !EVS[key][idx]) return;
  EVS[key].splice(idx,1);
  if(!EVS[key].length) delete EVS[key];
  save(); buildAll(); closeOverlay();
}

// ─── FILTER ───────────────────────────────────────────────────────────────
function applyFilter(ph, rebuild=true) {
  if(rebuild) { filter=ph; buildAll(); return; }
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.toggle('active',b.dataset.phase===ph));
  const blocks=document.querySelectorAll('.month-block');
  const divs=document.querySelectorAll('.phase-div');

  if(ph==='all'){ blocks.forEach(b=>{b.classList.remove('dimmed');b.style.display='';}); divs.forEach(d=>d.style.display=''); document.querySelectorAll('.chip').forEach(c=>c.style.opacity=''); return; }
  if(ph==='crit'){ blocks.forEach(b=>{b.classList.remove('dimmed');b.style.display='';}); divs.forEach(d=>d.style.display=''); document.querySelectorAll('.chip').forEach(c=>{c.style.opacity=c.classList.contains('p-crit')?'1':'0.07';}); return; }

  blocks.forEach(b=>{ const v=b.dataset.ph===ph; b.classList.toggle('dimmed',!v); b.style.display=v?'':'none'; });
  divs.forEach(d=>{ const lbl=d.querySelector('.pd-label'); d.style.display=(lbl&&lbl.textContent.trim()===PM[ph].l)?'':'none'; });
  document.querySelectorAll('.chip').forEach(c=>c.style.opacity='');
}

document.querySelectorAll('.f-btn').forEach(b=>b.addEventListener('click',()=>{ filter=b.dataset.phase; buildAll(); }));

// ─── EXPORT / IMPORT ─────────────────────────────────────────────────────
function exportData() {
  const blob=new Blob([JSON.stringify({v:2,events:EVS},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`sal_de_mare_${today.toISOString().slice(0,10)}.json`; a.click();
}
function importData() { document.getElementById('file-in').click(); }
function handleImport(e) {
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{ try{ const d=JSON.parse(ev.target.result); EVS=migrateEvents(d.events||d); save(); buildAll(); }catch(err){ alert('Arquivo invÃ¡lido.'); } };
  r.readAsText(file); e.target.value='';
}

// ─── INIT ─────────────────────────────────────────────────────────────────
async function startSync() {
  if(syncStarted) return;
  syncStarted = true;
  try {
    clearSyncRetry();
    const app = getApps()[0] || initializeApp(firebaseConfig);
    db = getFirestore(app);
    calendarRef = doc(db, FIRESTORE_COLLECTION, FIRESTORE_DOCUMENT);
    setSyncStatus('syncing', 'Carregando dados');

    const snap = await getDoc(calendarRef);
    if(!snap.exists()) {
      await setDoc(calendarRef, {
        events: EVS,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
    }

    unsubscribeSnapshot = onSnapshot(calendarRef, (docSnap) => {
      const remoteData = docSnap.data() || {};
      const remote = remoteData.events;
      const remoteUpdatedAt = remoteData.updatedAt?.toMillis?.() || 0;
      const nextEvents = migrateEvents(remote || EVS || JSON.parse(JSON.stringify(DEFAULT_EVS)));
      const remoteJson = JSON.stringify(nextEvents);
      const localJson = JSON.stringify(EVS);
      if(pendingSyncJson && remoteJson !== pendingSyncJson) {
        return;
      }
      if(localDirty && localJson !== remoteJson) {
        if(!pendingSyncJson && calendarRef) {
          pendingSyncJson = localJson;
          setSyncStatus('syncing', 'Sincronizando');
          clearTimeout(saveTimer);
          saveTimer = setTimeout(pushEventsToFirestore, 50);
        }
        syncReady = true;
        buildAll();
        return;
      }
      EVS = nextEvents;
      localUpdatedAt = Math.max(localUpdatedAt, remoteUpdatedAt);
      if(pendingSyncJson === remoteJson) {
        pendingSyncJson = null;
      }
      localDirty = false;
      persistCache();
      syncReady = true;
      buildAll();
      setSyncStatus('ok', 'Sincronizado');
    }, (error) => {
      console.error(error);
      syncReady = false;
      setSyncStatus('error', 'Erro no Firebase');
      syncStarted = false;
      scheduleRetrySync();
    });
  } catch (error) {
    console.error(error);
    syncReady = false;
    setSyncStatus('local', 'Modo local');
    syncStarted = false;
    scheduleRetrySync();
    buildAll();
  }
}

function unlockApp() {
  sessionStorage.setItem(SESSION_KEY, '1');
  document.getElementById('login-gate').classList.add('hidden');
  document.getElementById('app-shell').classList.remove('hidden');
  buildAll();
  startSync();
}

function handleLogin(event) {
  event.preventDefault();
  const input = document.getElementById('password-input');
  const error = document.getElementById('login-error');
  if(input.value === ACCESS_PASSWORD) {
    error.textContent = '';
    unlockApp();
    return;
  }
  error.textContent = 'Senha incorreta.';
  input.select();
}

document.getElementById('login-form').addEventListener('submit', handleLogin);

if(sessionStorage.getItem(SESSION_KEY) === '1') {
  unlockApp();
}

window.addEventListener('offline', () => setSyncStatus('local', 'Sem internet'));
